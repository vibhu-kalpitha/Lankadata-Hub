# ─────────────────────────────────────────────────────
# LankaData Hub - Docker Compose
# Orchestrates the React frontend, FastAPI backend, and PostgreSQL database.
#
# Usage:
#   docker-compose up --build
#
# Services available:
#   Frontend:   http://localhost:5173
#   Backend:    http://localhost:8000
#   DB Admin:   http://localhost:5050  (pgAdmin)
# ─────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL Database ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lankadata_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lankadata_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lankadata_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lankadata_hub
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── React Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lankadata_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ── pgAdmin (optional DB management tool) ─────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lankadata_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lankadatahub.lk
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
